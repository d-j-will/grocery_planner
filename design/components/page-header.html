<!-- @dsCard group="Layout" name="Page header" subtitle="Title + description, with actions, centered — UIComponents.page_header/1" -->
<!doctype html>
<html lang="en" data-theme="fairway">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page header</title>
<link rel="stylesheet" href="../assets/app.css">
<link rel="stylesheet" href="../styles.css">
</head>
<body class="bg-base-200 min-h-screen p-8">
<select class="select select-xs fixed top-2 right-2 w-32 z-50 opacity-60 hover:opacity-100" aria-label="Theme" onchange="document.documentElement.dataset.theme=this.value">
  <option>fairway</option><option>orchard</option><option>marble</option><option>dark</option>
</select>

<div class="max-w-3xl mx-auto space-y-12">
  <div class="mb-8">
    <h1 class="text-4xl font-bold text-base-content">Recipes</h1>
    <p class="mt-2 text-lg text-base-content/70">Browse and manage your recipe collection</p>
  </div>

  <div class="mb-8 flex items-start justify-between">
    <div class="flex-1">
      <h1 class="text-4xl font-bold text-base-content">Settings</h1>
      <p class="mt-2 text-lg text-base-content/70">Manage your account</p>
    </div>
    <div class="flex gap-3 ml-4">
      <button class="btn btn-primary btn-soft">Cancel</button>
      <button class="btn btn-primary">Save</button>
    </div>
  </div>

  <div class="mb-8 text-center">
    <h1 class="text-4xl font-bold text-base-content">Welcome back, David!</h1>
    <p class="mt-2 text-lg text-base-content/70">Here's what's happening in your kitchen</p>
  </div>
</div>
</body>
</html>
