<!-- @dsCard group="Feedback" name="Modal" subtitle="Dialog panel over neutral scrim — CoreComponents.modal/1 (shown state)" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modal</title>
<link rel="stylesheet" href="../assets/app.css">
</head>
<body class="bg-base-200 min-h-screen p-8">
<select class="select select-xs fixed top-2 right-2 w-32 z-50 opacity-60 hover:opacity-100" aria-label="Theme" onchange="document.documentElement.dataset.theme=this.value">
  <option>light</option><option>dark</option><option>cupcake</option><option>bumblebee</option><option>synthwave</option><option>retro</option><option>cyberpunk</option><option>dracula</option><option>nord</option><option>sunset</option><option>business</option><option>luxury</option>
</select>

<!-- Page content behind the modal, for scrim contrast -->
<div class="max-w-3xl mx-auto opacity-100">
  <h1 class="text-4xl font-bold text-base-content">Recipes</h1>
  <p class="mt-2 text-lg text-base-content/70">Browse and manage your recipe collection</p>
</div>

<div class="relative z-40">
  <div class="fixed inset-0 bg-neutral/50 transition-opacity" aria-hidden="true"></div>
  <div class="fixed inset-0 overflow-y-auto" role="dialog" aria-modal="true" tabindex="0">
    <div class="flex min-h-full items-center justify-center p-4 text-center">
      <div class="relative w-full max-w-3xl transform overflow-hidden rounded-2xl bg-base-100 p-6 text-left align-middle shadow-xl transition-all">
        <div class="absolute top-4 right-4">
          <button type="button" class="-m-3 flex-none p-3 opacity-20 hover:opacity-40" aria-label="close">
            <span class="hero-x-mark size-5"></span>
          </button>
        </div>
        <div>
          <h2 class="text-lg font-semibold text-base-content mb-2">Delete shopping list?</h2>
          <p class="text-sm text-base-content/70 mb-6">This removes “Weekly shop — 12 July” and its 23 items. This can't be undone.</p>
          <div class="flex justify-end gap-3">
            <button class="btn btn-primary btn-soft">Cancel</button>
            <button class="btn btn-error">Delete list</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
