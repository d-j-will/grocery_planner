<!-- @dsCard group="Data display" name="List items" subtitle="Icon + content + actions, clickable variant — UIComponents.list_item/1" -->
<!doctype html>
<html lang="en" data-theme="fairway">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>List items</title>
<link rel="stylesheet" href="../assets/app.css">
<link rel="stylesheet" href="../styles.css">
</head>
<body class="bg-base-200 min-h-screen p-8">
<select class="select select-xs fixed top-2 right-2 w-32 z-50 opacity-60 hover:opacity-100" aria-label="Theme" onchange="document.documentElement.dataset.theme=this.value">
  <option>fairway</option><option>orchard</option><option>marble</option><option>dark</option>
</select>

<div class="max-w-2xl mx-auto bg-base-100 rounded-2xl border border-base-200 shadow-sm p-6 space-y-3">
  <div class="flex items-center justify-between p-4 bg-base-200/30 rounded-xl border border-base-200 transition">
    <div class="flex items-center gap-4 flex-1">
      <div>
        <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
          <span class="hero-user w-5 h-5 text-primary"></span>
        </div>
      </div>
      <div class="flex-1">
        <p class="font-semibold">David Williams</p>
        <p class="text-sm text-base-content/70">david@example.com · Owner</p>
      </div>
    </div>
    <div class="flex gap-2 ml-4">
      <button class="btn btn-sm btn-error">Remove</button>
    </div>
  </div>

  <div class="flex items-center justify-between p-4 bg-base-200/30 rounded-xl border border-base-200 transition hover:border-secondary/30 hover:bg-secondary/5 cursor-pointer">
    <div class="flex items-center gap-4 flex-1">
      <div>
        <div class="w-10 h-10 bg-secondary/10 rounded-lg flex items-center justify-center">
          <span class="hero-shopping-cart w-5 h-5 text-secondary"></span>
        </div>
      </div>
      <div class="flex-1">
        <p class="font-semibold">Weekly shop — 12 July</p>
        <p class="text-sm text-base-content/70">23 items · 4 checked off</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
