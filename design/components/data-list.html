<!-- @dsCard group="Data display" name="Data list" subtitle="Title/value rows — CoreComponents.list/1" -->
<!doctype html>
<html lang="en" data-theme="fairway">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data list</title>
<link rel="stylesheet" href="../assets/app.css">
<link rel="stylesheet" href="../styles.css">
</head>
<body class="bg-base-200 min-h-screen p-8">
<select class="select select-xs fixed top-2 right-2 w-32 z-50 opacity-60 hover:opacity-100" aria-label="Theme" onchange="document.documentElement.dataset.theme=this.value">
  <option>fairway</option><option>orchard</option><option>marble</option><option>dark</option>
</select>

<div class="max-w-md mx-auto bg-base-100 rounded-2xl border border-base-200 shadow-sm p-6">
  <ul class="list">
    <li class="list-row">
      <div class="list-col-grow">
        <div class="font-bold">Servings</div>
        <div>4 people</div>
      </div>
    </li>
    <li class="list-row">
      <div class="list-col-grow">
        <div class="font-bold">Prep time</div>
        <div>15 minutes</div>
      </div>
    </li>
    <li class="list-row">
      <div class="list-col-grow">
        <div class="font-bold">Cook time</div>
        <div>35 minutes</div>
      </div>
    </li>
  </ul>
</div>
</body>
</html>
