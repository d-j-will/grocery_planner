<!-- @dsCard group="Cards" name="Stat cards" subtitle="Static and clickable variants — UIComponents.stat_card/1" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stat cards</title>
<link rel="stylesheet" href="../assets/app.css">
</head>
<body class="bg-base-200 min-h-screen p-8">
<select class="select select-xs fixed top-2 right-2 w-32 z-50 opacity-60 hover:opacity-100" aria-label="Theme" onchange="document.documentElement.dataset.theme=this.value">
  <option>light</option><option>dark</option><option>cupcake</option><option>bumblebee</option><option>synthwave</option><option>retro</option><option>cyberpunk</option><option>dracula</option><option>nord</option><option>sunset</option><option>business</option><option>luxury</option>
</select>

<div class="max-w-4xl mx-auto space-y-8">
  <div>
    <h2 class="text-lg font-semibold text-base-content mb-4">Static</h2>
    <div class="grid sm:grid-cols-2 gap-4">
      <div class="bg-base-100 p-6 rounded-2xl shadow-sm border border-base-200">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
            <span class="hero-cube w-6 h-6"></span>
          </div>
          <div>
            <p class="text-sm font-medium text-base-content/60">Total Inventory</p>
            <div class="flex items-baseline gap-2">
              <h3 class="text-2xl font-bold text-base-content">127</h3>
              <span class="text-sm text-base-content/60">items</span>
            </div>
            <p class="text-xs mt-1 text-base-content/50">15 individual units</p>
          </div>
        </div>
      </div>

      <div class="bg-base-100 p-6 rounded-2xl shadow-sm border border-base-200">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-warning/10 rounded-xl flex items-center justify-center text-warning">
            <span class="hero-clock w-6 h-6"></span>
          </div>
          <div>
            <p class="text-sm font-medium text-base-content/60">Expiring Soon</p>
            <div class="flex items-baseline gap-2">
              <h3 class="text-2xl font-bold text-warning">8</h3>
              <span class="text-sm text-base-content/60">items</span>
            </div>
            <p class="text-xs mt-1 text-warning/80">Within 7 days</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <h2 class="text-lg font-semibold text-base-content mb-4">Clickable (link variant)</h2>
    <div class="grid sm:grid-cols-2 gap-4">
      <a href="#" class="p-6 rounded-2xl border-2 hover:shadow-lg transition-all cursor-pointer bg-error/10 border-error hover:border-error block">
        <h3 class="text-sm font-medium mb-1 text-error">Expired</h3>
        <div class="flex items-baseline gap-2">
          <p class="text-3xl font-bold text-error">3</p>
          <span class="text-sm text-error/80">items</span>
        </div>
        <p class="text-sm mt-1 text-error/80">Remove immediately</p>
      </a>

      <a href="#" class="p-6 rounded-2xl border-2 hover:shadow-lg transition-all cursor-pointer bg-success/10 border-success hover:border-success block">
        <h3 class="text-sm font-medium mb-1 text-success">In stock</h3>
        <div class="flex items-baseline gap-2">
          <p class="text-3xl font-bold text-success">116</p>
          <span class="text-sm text-success/80">items</span>
        </div>
        <p class="text-sm mt-1 text-success/80">Fresh and ready</p>
      </a>
    </div>
  </div>
</div>
</body>
</html>
