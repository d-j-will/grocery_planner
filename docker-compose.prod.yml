# ═══════════════════════════════════════════════════════════════════════════
# Production compose for the homelab Docker host (192.168.1.102), slackex
# pattern: this file + .env live in /root/grocery_planner/; caddy-docker-proxy
# discovers the app via labels; postgres stays on the implicit default network,
# app joins default + proxy. Images pushed to GHCR by .github/workflows/
# deploy-homelab.yml; that workflow runs `pull → migrate → up -d` over SSH.
#
# One-time host provisioning (see docs — the deploy runbook, ticket tdu.6):
#   docker volume create grocery_planner_receipt-uploads
#   docker volume create grocery_planner_hf-cache
#   # named volumes are created root-owned; the app runs as nobody (65534)
#   # and the sidecar as appuser (1000):
#   docker run --rm -v grocery_planner_receipt-uploads:/v alpine chown 65534:65534 /v
#   docker run --rm -v grocery_planner_hf-cache:/v alpine chown 1000:1000 /v
#
# IMAGE_OWNER (in .env) is the GHCR namespace the deploy workflow pushed to —
# it must equal ${{ github.repository_owner }}, i.e. the repo owner (d-j-will).
# ═══════════════════════════════════════════════════════════════════════════

services:
  app:
    image: ghcr.io/${IMAGE_OWNER}/grocery_planner:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PHX_SERVER: "true"
      PHX_HOST: food.davewil.dev
      PORT: "4000"
      AI_SERVICE_URL: http://ai-service:8000
      RECEIPT_STORAGE_PATH: /data/uploads/receipts
      # Feature flags — day-one posture (react to this):
      RECEIPT_PROCESSING_ENABLED: "true"
      SEMANTIC_SEARCH_ENABLED: "true"
      AI_CATEGORIZATION_ENABLED: "false" # off for v1 (real-ML classification not enabled yet); don't serve stub categories. GPU-local path deferred to grocery_planner-89l
      # Tracing: off until a collector exists on the homelab (INFRA-002 Grafana
      # stack). Flip to "true" AND set OTEL_EXPORTER_OTLP_ENDPOINT together —
      # enabling without an endpoint disables itself with a warning rather than
      # exporting into the void. Until then setup is skipped entirely, so no spans
      # are created and nothing is dropped.
      OTEL_ENABLED: "false"
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4317
    volumes:
      - receipt-uploads:/data/uploads/receipts
    networks:
      - default
      - proxy
    labels:
      caddy: food.davewil.dev
      caddy.reverse_proxy: "{{upstreams 4000}}"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        # started, not healthy: sidecar is optional (health reports "degraded",
        # app must boot without it) — see grocery_planner-c29
        condition: service_started
        required: false
    healthcheck:
      # /ready is DB-aware and sidecar-independent: a degraded AI sidecar must
      # not mark the app unhealthy. /health_check (503 on degraded) is for
      # monitoring, not this gate. See org-brain single-instance-ship-ready-defer-liveness.
      test: ["CMD", "curl", "-f", "http://localhost:4000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg18 # per research ticket tdu.1; pin digest at deploy
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # pg18's Docker image moved PGDATA to a version-specific subdirectory
      # (/var/lib/postgresql/18/docker) so pg_upgrade --link works across a
      # single mount. Mount the PARENT — mounting the old /var/lib/postgresql/data
      # makes the image guard-and-exit on first boot ("unused mount/volume").
      # See docker-library/postgres#1259 & issue #37.
      - pg-data:/var/lib/postgresql
    # implicit default network only — never on proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      # first-boot initdb must not count as health failures
      start_period: 30s

  ai-service:
    image: ghcr.io/${IMAGE_OWNER}/grocery_planner-ai:latest
    restart: unless-stopped
    environment:
      # v1 runs OCR on CPU via Tesseract. vLLM/GPU OCR is off for v1 by choice,
      # NOT because GPU is banned — GPU/ROCm is viable on the headless Proxmox
      # host (org-brain: headless-amd-apu-blacklist-amdgpu-for-cpu-only-ml);
      # the GPU sidecar path is deferred to grocery_planner-89l.
      USE_VLLM_OCR: "false"
      USE_TESSERACT_OCR: "true"
      USE_REAL_CLASSIFICATION: "false" # off for v1 (distilbart-mnli ~1GB, CPU-hungry); GPU-local classification now viable — deferred to grocery_planner-89l
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      DEBUG: "false"
      TIDEWAVE_ENABLED: "false" # dev tool; defaults to TRUE in config.py — must be off
      OTEL_ENABLED: "false" # flipped by the OTel exporter ticket (t7j)
      AI_DATABASE_URL: sqlite:////data/ai_data.db
    volumes:
      # MiniLM (~90MB) downloads from HF on first boot into appuser's cache;
      # volume-backed so recreates don't re-download. Alternative (rejected
      # for now): bake the model into the image — bigger image, no first-boot
      # network dependency. Revisit if first boot on the homelab is painful.
      - hf-cache:/home/appuser/.cache
      - ai-data:/data
    # default network only — reached via app, never public
    # Sizing: react to this — VM specs unknown to the draft. Ceiling chosen
    # so an OCR burst can't starve postgres/app on the shared host.
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s # first boot downloads the embedding model

volumes:
  pg-data:
  receipt-uploads:
  hf-cache:
  ai-data:

networks:
  proxy:
    external: true
